name: Build & Push Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to push (e.g. latest, v1.2.3)'
        required: false
        default: 'latest'

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - name: full
            dockerfile: Dockerfile
          - name: slim
            dockerfile: Dockerfile.slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push AMD64
        run: |
          DOCKERFILE=${{ matrix.variant.dockerfile }}
          VARIANT=${{ matrix.variant.name }}
          TAG=${{ github.event.inputs.tag }}
          docker buildx build --platform linux/amd64 \
            --cache-from=type=registry,ref=goshitsarch/vane:${VARIANT}-${TAG}-amd64 \
            --cache-to=type=inline \
            --provenance false \
            -f $DOCKERFILE \
            -t goshitsarch/vane:${VARIANT}-${TAG}-amd64 \
            --push .

  build-arm64:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        variant:
          - name: full
            dockerfile: Dockerfile
          - name: slim
            dockerfile: Dockerfile.slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ARM64
        run: |
          DOCKERFILE=${{ matrix.variant.dockerfile }}
          VARIANT=${{ matrix.variant.name }}
          TAG=${{ github.event.inputs.tag }}
          docker buildx build --platform linux/arm64 \
            --cache-from=type=registry,ref=goshitsarch/vane:${VARIANT}-${TAG}-arm64 \
            --cache-to=type=inline \
            --provenance false \
            -f $DOCKERFILE \
            -t goshitsarch/vane:${VARIANT}-${TAG}-arm64 \
            --push .

  manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [full, slim]
    steps:
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push multi-arch manifest
        run: |
          VARIANT=${{ matrix.variant }}
          TAG=${{ github.event.inputs.tag }}
          docker manifest create goshitsarch/vane:${VARIANT}-${TAG} \
            --amend goshitsarch/vane:${VARIANT}-${TAG}-amd64 \
            --amend goshitsarch/vane:${VARIANT}-${TAG}-arm64
          docker manifest push goshitsarch/vane:${VARIANT}-${TAG}

          if [ "$VARIANT" = "full" ] && [ "$TAG" = "latest" ]; then
            docker manifest create goshitsarch/vane:latest \
              --amend goshitsarch/vane:${VARIANT}-${TAG}-amd64 \
              --amend goshitsarch/vane:${VARIANT}-${TAG}-arm64
            docker manifest push goshitsarch/vane:latest
          fi
